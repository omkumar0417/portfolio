<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Online Examination Portal Preview</title>
  <desc id="desc">A simple preview banner for the Online Examination Portal project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111e"/>
      <stop offset="100%" stop-color="#163854"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4db6ac"/>
      <stop offset="100%" stop-color="#7aa9ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="30" fill="url(#bg)"/>
  <circle cx="1015" cy="130" r="86" fill="#4db6ac" opacity="0.10"/>
  <circle cx="960" cy="445" r="165" fill="#7aa9ff" opacity="0.08"/>

  <text x="100" y="138" fill="#4db6ac" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">CASE STUDY</text>
  <text x="100" y="220" fill="#f8fbff" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="800">Online Examination</text>
  <text x="100" y="276" fill="#f8fbff" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="800">Portal</text>
  <text x="100" y="346" fill="#cfd9e8" font-family="Segoe UI, Arial, sans-serif" font-size="24">
    <tspan x="100" dy="0">Secure exam flow with Java, Servlets, JSP,</tspan>
    <tspan x="100" dy="34">JDBC, and Oracle SQL.</tspan>
  </text>
  <text x="100" y="454" fill="#dce7f4" font-family="Segoe UI, Arial, sans-serif" font-size="22">Timed exams • Role access • Result history</text>

  <circle cx="930" cy="300" r="125" fill="url(#accent)" opacity="0.15"/>
  <circle cx="930" cy="300" r="96" fill="none" stroke="#79aaff" stroke-width="2"/>
  <text x="930" y="292" text-anchor="middle" fill="#f8fbff" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800">90m</text>
  <text x="930" y="330" text-anchor="middle" fill="#dce7f4" font-family="Segoe UI, Arial, sans-serif" font-size="18">exam ready</text>
</svg>