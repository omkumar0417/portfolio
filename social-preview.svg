<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Om Kumar Portfolio Social Preview</title>
  <desc id="desc">A simple social preview image for Om Kumar's portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111e"/>
      <stop offset="100%" stop-color="#12324f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4db6ac"/>
      <stop offset="100%" stop-color="#7aa9ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="30" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="96" fill="#4db6ac" opacity="0.10"/>
  <circle cx="965" cy="460" r="170" fill="#7aa9ff" opacity="0.08"/>
  <path d="M90 510 C 240 460, 380 460, 520 510" fill="none" stroke="#244866" stroke-width="3" opacity="0.7"/>

  <text x="100" y="138" fill="#4db6ac" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">OM KUMAR</text>
  <text x="100" y="220" fill="#f8fbff" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="800">Java &amp; Full-Stack</text>
  <text x="100" y="276" fill="#f8fbff" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="800">Developer Portfolio</text>
  <text x="100" y="346" fill="#cfd9e8" font-family="Segoe UI, Arial, sans-serif" font-size="24">
    <tspan x="100" dy="0">Builds reliable web apps with Java, SQL,</tspan>
    <tspan x="100" dy="34">and clean, modern user interfaces.</tspan>
  </text>
  <text x="100" y="456" fill="#dce7f4" font-family="Segoe UI, Arial, sans-serif" font-size="22">Java • SQL • Web Apps • Case Studies</text>
  <text x="100" y="515" fill="#7fd3ff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">omkumarportfolio.vercel.app</text>

  <circle cx="930" cy="300" r="122" fill="url(#accent)" opacity="0.14"/>
  <circle cx="930" cy="300" r="92" fill="none" stroke="#79aaff" stroke-width="2"/>
  <text x="930" y="290" text-anchor="middle" fill="#f8fbff" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">OM</text>
  <text x="930" y="328" text-anchor="middle" fill="#dce7f4" font-family="Segoe UI, Arial, sans-serif" font-size="18">Portfolio</text>
</svg>