<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">SRM Grade Calculator Preview</title>
  <desc id="desc">A simple preview banner for the SRM Grade Calculator project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111e"/>
      <stop offset="100%" stop-color="#22384f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4db6ac"/>
      <stop offset="100%" stop-color="#7aa9ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="30" fill="url(#bg)"/>
  <circle cx="1015" cy="120" r="82" fill="#7aa9ff" opacity="0.10"/>
  <circle cx="960" cy="450" r="165" fill="#4db6ac" opacity="0.07"/>

  <text x="100" y="138" fill="#4db6ac" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">PROJECT PAGE</text>
  <text x="100" y="220" fill="#f8fbff" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="800">SRM Grade Calculator</text>
  <text x="100" y="346" fill="#cfd9e8" font-family="Segoe UI, Arial, sans-serif" font-size="24">
    <tspan x="100" dy="0">Responsive HTML, CSS, and JavaScript tool</tspan>
    <tspan x="100" dy="34">for quick grade estimation.</tspan>
  </text>
  <text x="100" y="454" fill="#dce7f4" font-family="Segoe UI, Arial, sans-serif" font-size="22">Fast results • Validation • Mobile friendly</text>

  <circle cx="930" cy="300" r="126" fill="url(#accent)" opacity="0.16"/>
  <circle cx="930" cy="300" r="98" fill="none" stroke="#79aaff" stroke-width="2"/>
  <text x="930" y="290" text-anchor="middle" fill="#f8fbff" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="800">A+</text>
  <text x="930" y="330" text-anchor="middle" fill="#dce7f4" font-family="Segoe UI, Arial, sans-serif" font-size="18">quick estimate</text>
</svg>